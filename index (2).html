<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>SIA | GTA Editor</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: radial-gradient(circle at top, #ff0077, #0a0a0a 70%);
}

/* контейнер */
.container {
  margin-top: 80px;
}

/* аватар */
.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid #ff0077;
  box-shadow: 0 0 25px #ff0077;
  object-fit: cover;
}

/* ник */
h1 {
  margin: 15px 0 5px;
  font-size: 32px;
}

/* описание */
.bio {
  max-width: 300px;
  margin: auto;
  color: #ccc;
  font-size: 15px;
  line-height: 1.4;
}

/* кнопки */
.links a {
  display: block;
  margin: 15px auto;
  padding: 14px;
  width: 240px;
  border-radius: 15px;
  text-decoration: none;
  color: white;
  background: linear-gradient(45deg, #ff0077, #ff4d00);
  transition: 0.3s;
  font-weight: bold;
}

.links a:hover {
  transform: scale(1.07);
  box-shadow: 0 0 15px #ff0077;
}
</style>

</head>

<body>

<div class="container">

  <!-- АВАТАР -->
  <img src="avatar.png" class="avatar" alt="avatar">

  <!-- НИК -->

    </a>

    <a href="https://youtube.com" target="_blank">
      YouTube
    </a>

    <a href="https://t.me/yourtelegram" target="_blank">
      Telegram
    </a>

  </div>

</div>

</body>
</html>
