<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIARA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{

background:#000;
overflow:hidden;
height:100vh;
color:white;

}

/* ===========================
ФОН
=========================== */

.background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:url("banner.jpg") center center/cover;

animation:zoom 25s ease-in-out infinite alternate;

filter:brightness(.45);

z-index:-10;

}

@keyframes zoom{

0%{

transform:scale(1);

}

100%{

transform:scale(1.12);

}

}

/* затемнение */

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
180deg,
rgba(0,0,0,.45),
rgba(0,0,0,.72)
);

z-index:-9;

}

/* шум */

.noise{

position:fixed;

top:0;
left:0;

width:200%;
height:200%;

opacity:.05;

background:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");

animation:noise 1s steps(2) infinite;

z-index:-8;

}

@keyframes noise{

0%{

transform:translate(0,0);

}

25%{

transform:translate(-2%,-1%);

}

50%{

transform:translate(2%,1%);

}

75%{

transform:translate(-1%,2%);

}

100%{

transform:translate(0,0);

}

}

/* ===========================
КОНТЕЙНЕР
=========================== */

.wrapper{

width:100%;
height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.card{

width:420px;

padding:40px;

border-radius:30px;

background:rgba(18,18,18,.55);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 0 60px rgba(0,0,0,.5);

text-align:center;

animation:show 1.3s;

}

@keyframes show{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:none;

}

}

.banner{

width:100%;

height:170px;

object-fit:cover;

border-radius:18px;

margin-bottom:25px;

filter:grayscale(100%);

transition:.5s;

}

.banner:hover{

transform:scale(1.03);

}

h1{

font-size:58px;

font-weight:900;

letter-spacing:8px;

}

.subtitle{

margin-top:10px;

color:#bbb;

font-size:15px;

letter-spacing:2px;

}

.line{

width:120px;

height:1px;

background:#444;

margin:25px auto;

}
/* ===========================
PROMO BLOCK
=========================== */

.promo{

margin-top:25px;

padding:20px;

border-radius:18px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

text-align:center;

letter-spacing:6px;

transition:.4s;

}


.promo span{

font-size:28px;

font-weight:900;

color:white;

}


.promo p{

margin-top:5px;

font-size:13px;

color:#888;

letter-spacing:8px;

}


.promo:hover{

transform:translateY(-5px);

background:rgba(255,255,255,.08);

box-shadow:0 15px 40px rgba(255,255,255,.12);

}
/* ===========================
КНОПКИ
=========================== */

.buttons{

display:flex;

gap:15px;

justify-content:center;

margin-top:25px;

}

.btn{

flex:1;

padding:14px;

text-decoration:none;

color:white;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

transition:.35s;

font-weight:600;

letter-spacing:1px;

}

.btn:hover{

background:white;

color:black;

transform:translateY(-5px);

box-shadow:0 15px 35px rgba(255,255,255,.18);

}

/* ===========================
МУЗЫКА
=========================== */

.player{

margin-top:30px;

padding:18px;

border-radius:18px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

}

.player h3{

font-size:13px;

color:#888;

letter-spacing:4px;

margin-bottom:15px;

}

.song{

font-size:20px;

font-weight:700;

}

.artist{

margin-top:5px;

color:#888;

font-size:14px;

}

.controls{

display:flex;

justify-content:center;

align-items:center;

gap:20px;

margin-top:18px;

}

.play{

width:60px;

height:60px;

border-radius:50%;

border:none;

cursor:pointer;

font-size:20px;

background:white;

color:black;

transition:.3s;

}

.play:hover{

transform:scale(1.1);

}

.progress{

margin-top:18px;

width:100%;

height:4px;

background:#333;

border-radius:20px;

overflow:hidden;

}

.progress span{

display:block;

width:0%;

height:100%;

background:white;

}

/* ===========================
GLITCH
=========================== */

.glitch{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

opacity:0;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent);

animation:glitch 7s infinite;

}

@keyframes glitch{

0%,94%,100%{

opacity:0;
transform:translateX(0);

}

95%{

opacity:.3;
transform:translateX(-8px);

}

96%{

transform:translateX(8px);

}

97%{

transform:translateX(-4px);

}

98%{

transform:translateX(4px);

}

99%{

opacity:0;

}

}

@media(max-width:700px){

.card{

width:100%;

padding:25px;

}

h1{

font-size:42px;

letter-spacing:5px;

}

.banner{

height:140px;

}

}

</style>

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="noise"></div>

<div class="glitch"></div>

<div class="wrapper">

<div class="card">

<img src="banner.jpg" class="banner">

<h1>KIARA</h1>

<p class="subtitle">

VIDEO EDITOR • CONTENT CREATOR

</p>

<div class="line"></div>

<div class="promo">

    <span>KIARA</span>
    <p>PROMO</p>

</div>
<div class="player">

<h3>SONG</h3>

<div class="song">vibe</div>

<div class="artist">KIARA Playlist</div>

<div class="controls">

<button class="play" id="playBtn">▶</button>

</div>

<div class="progress">

<span id="progress"></span>

</div>

<audio id="music">

<source src="music.mp3" type="audio/mpeg">

</audio>

</div>

</div>

</div>

<script>
  const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

let playing = false;

// ▶ Play / Pause
playBtn.onclick = () => {

    if (music.paused) {

        music.play();

        playBtn.innerHTML = "❚❚";

    } else {

        music.pause();

        playBtn.innerHTML = "▶";

    }

};

// Полоса прогресса
music.addEventListener("timeupdate", () => {

    if (music.duration) {

        let percent = (music.currentTime / music.duration) * 100;

        progress.style.width = percent + "%";

    }

});

// После окончания
music.onended = () => {

    playBtn.innerHTML = "▶";

    playing = false;

    progress.style.width = "0%";

};

// ============================
// Параллакс карточки
// ============================

const card = document.querySelector(".card");

document.addEventListener("mousemove", e => {

    let x = (window.innerWidth / 2 - e.clientX) / 35;

    let y = (window.innerHeight / 2 - e.clientY) / 35;

    card.style.transform =
        `rotateY(${-x}deg) rotateX(${y}deg)`;

});

document.addEventListener("mouseleave", () => {

    card.style.transform =
        "rotateY(0deg) rotateX(0deg)";

});

// ============================
// Медленное появление элементов
// ============================

window.onload = () => {

    document.querySelector(".banner").style.opacity = "0";

    document.querySelector("h1").style.opacity = "0";

    document.querySelector(".subtitle").style.opacity = "0";

    setTimeout(() => {

        document.querySelector(".banner").style.transition = "1s";
        document.querySelector(".banner").style.opacity = "1";

    }, 300);

    setTimeout(() => {

        document.querySelector("h1").style.transition = "1s";
        document.querySelector("h1").style.opacity = "1";

    }, 700);

    setTimeout(() => {

        document.querySelector(".subtitle").style.transition = "1s";
        document.querySelector(".subtitle").style.opacity = "1";

    }, 1000);

};

// ============================
// Автовоспроизведение (если браузер разрешит)
// ============================

window.addEventListener("load", () => {

    music.volume = 0.35;

    music.play().then(() => {

        playing = true;

        playBtn.innerHTML = "❚❚";

    }).catch(() => {

        console.log("Автозапуск заблокирован браузером");

        playBtn.innerHTML = "▶";

    });

});</script>

</body>
</html>
