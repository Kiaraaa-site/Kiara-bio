<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIA | Profile</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  background: #0a0a12;
  overflow: hidden;
}

/* 🌸 мягкий неоновый фон */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 30%, #ff4fd8 0%, transparent 45%),
              radial-gradient(circle at 80% 70%, #7a5cff 0%, transparent 50%);
  filter: blur(50px);
  animation: move 8s ease-in-out infinite;
  z-index: -2;
}

@keyframes move {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* 💎 контейнер */
.container {
  animation: fadeIn 1.8s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 👋 приветствие */
.welcome {
  font-size: 22px;
  opacity: 0.9;
  margin-bottom: 10px;
}

/* 💎 ник */
h1 {
  font-size: 60px;
  letter-spacing: 6px;
  text-shadow:
    0 0 10px #ff4fd8,
    0 0 25px #7a5cff;
}

/* 📸 аватар */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 15px;
  border: 2px solid #ff4fd8;
  box-shadow: 0 0 20px #ff4fd8;
  object-fit: cover;
}

/* ✨ текст */
.subtitle {
  margin-top: 10px;
  font-size: 15px;
  opacity: 0.85;
}

/* 🟪 НЕОНОВЫЙ КВАДРАТ ПРОМО */
.promo-box {
  margin: 15px auto;
  width: 180px;
  height: 70px;
  border: 2px solid #ffcc00;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  letter-spacing: 2px;
  box-shadow: 0 0 15px #ffcc00;
}

.promo-box span {
  color: #ffcc00;
  font-weight: bold;
  text-shadow: 0 0 10px #ffcc00;
}

/* 🔗 кнопка сервера */
.server-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 25px;
  border-radius: 12px;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 12px #00ffcc;
}

.server-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ffcc;
}

/* 📱 адаптация */
@media (max-width: 600px) {
  h1 { font-size: 42px; }
  .promo-box { width: 150px; }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <!-- 👋 текст -->
  <div class="welcome">
    👋 Добро пожаловать на мой профиль
  </div>

  <h1>SIA</h1>

  <img class="avatar" src="avatar.png" alt="avatar">

  <div class="subtitle">
    🎬 Делаю крутые GTA5 видео и эдиты
  </div>

  <!-- 🟪 ПРОМО -->
  <div class="promo-box">
    PROMO <span>SIA</span>
  </div>

  <!-- 🔗 КНОПКА СЕРВЕРА -->
  <a class="server-btn" href="https://ukraine-gta5.com.ua/" target="_blank">
    🚀 Перейти на сервер GTA5
  </a>

</div>

</body>
</html>
