<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIA Profile</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🌸 фон */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 30%, #ff4fd8 0%, transparent 40%),
              radial-gradient(circle at 70% 70%, #8a4dff 0%, transparent 45%);
  filter: blur(60px);
  z-index: -3;
}

/* 💫 летающие ники */
.floating {
  position: absolute;
  color: #ff4fd8;
  font-size: 40px;
  opacity: 0.08;
  animation: float 12s linear infinite;
  white-space: nowrap;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-120vh); }
}

/* 🎬 INTRO НИК */
.intro {
  position: absolute;
  font-size: 80px;
  color: #ff4fd8;
  text-shadow: 0 0 20px #ff4fd8;
  letter-spacing: 10px;
  animation: introAnim 2.5s ease forwards;
}

@keyframes introAnim {
  0% { opacity: 0; transform: scale(0.5); }
  40% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.5); }
}

/* 📦 основной профиль */
.container {
  opacity: 0;
  animation: show 1s ease forwards;
  animation-delay: 2.3s;
  text-align: center;
  color: white;
}

@keyframes show {
  to { opacity: 1; }
}

/* 💎 ник */
h1 {
  font-size: 60px;
  color: #ff4fd8;
  text-shadow: 0 0 15px #ff4fd8;
}

/* 📸 аватар */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 15px;
  border: 2px solid #ff4fd8;
  box-shadow: 0 0 20px #ff4fd8;
}

/* 🟪 промо */
.promo-box {
  margin: 15px auto;
  width: 180px;
  height: 80px;
  border: 2px solid #ff4fd8;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  box-shadow: 0 0 20px #ff4fd8;
}

.promo-box span {
  color: #ffccff;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 10px #ff4fd8;
}

/* 🔘 кнопка */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 12px;
  border: 1px solid #ff4fd8;
  color: #ff4fd8;
  text-decoration: none;
  display: inline-block;
  box-shadow: 0 0 15px #ff4fd8;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #ff4fd8;
}

/* 📱 адаптация */
@media (max-width: 600px) {
  h1 { font-size: 40px; }
  .intro { font-size: 50px; }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 💫 летающие ники -->
<div class="floating" style="left:10%;">SIA</div>
<div class="floating" style="left:40%; animation-duration:10s;">SIA</div>
<div class="floating" style="left:70%; animation-duration:14s;">SIA</div>

<!-- 🎬 INTRO -->
<div class="intro">SIA</div>

<!-- 📦 профиль -->
<div class="container">

  <h1>SIA</h1>

  <img class="avatar" src="avatar.png" alt="avatar">

  <p style="margin-top:10px; opacity:0.8;">
    GTA 5 Editor • Cyber Videos • Montage Creator
  </p>

  <div class="promo-box">
    PROMO
    <span>TUS</span>
    <small style="opacity:0.7; margin-top:5px;">Server Ukraine GTA5</small>
  </div>

  <a class="btn" href="https://ukraine-gta5.com.ua/" target="_blank">
    Играть на сервере
  </a>

</div>

</body>
</html>
